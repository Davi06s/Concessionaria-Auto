# Configurazione stringa di connessione JDBC per MySQL
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/gestione_concessionaria?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Davi2006s!}

# Configurazione Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Forza Hibernate a usare i nomi esatti scritti negli @Column e @Table
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Porta per l'applicazione Spring Boot
server.port=8080

