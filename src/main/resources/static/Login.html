<!DOCTYPE html>
<html lang="it">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login & Registrazione</title>
        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <!-- Google Fonts: Outfit -->
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
        <style>
            :root {
                --bg-color: #0f172a;
                --card-bg: rgba(30, 41, 59, 0.85);
                --accent-primary: #60a5fa;
                --accent-secondary: #34d399;
                --text-color: #ffffff;
            }

            body {
                font-family: 'Outfit', sans-serif;
                background: radial-gradient(circle at top right, rgba(96, 165, 250, 0.18), transparent 50%),
                            radial-gradient(circle at bottom left, rgba(52, 211, 153, 0.08), transparent 50%),
                            var(--bg-color);
                color: var(--text-color);
                min-height: 100vh;
            }

            .auth-container {
                width: 100%;
                max-width: 550px;
            }

            .glass-card {
                background: var(--card-bg);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
                border: 1px solid rgba(255, 255, 255, 0.15);
                border-radius: 24px;
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
                padding: 40px;
                transition: all 0.3s ease;
            }

            .nav-pills {
                background: rgba(255, 255, 255, 0.05);
                padding: 6px;
                border-radius: 50px;
                margin-bottom: 30px;
                border: 1px solid rgba(255, 255, 255, 0.05);
            }

            .nav-pills .nav-link {
                border-radius: 50px;
                color: #9ca3af;
                font-weight: 600;
                padding: 10px 24px;
                transition: all 0.3s ease;
            }

            .nav-pills .nav-link.active {
                background: var(--accent-primary);
                color: white;
                box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            }

            .form-label {
                font-weight: 600;
                color: #f1f5f9;
                margin-bottom: 8px;
                font-size: 0.95rem;
            }

            .form-control {
                background: rgba(15, 23, 42, 0.6);
                border: 1px solid rgba(255, 255, 255, 0.22);
                color: white;
                border-radius: 12px;
                padding: 12px 16px;
                transition: all 0.3s ease;
            }

            .form-control:focus {
                background: rgba(15, 23, 42, 0.8);
                border-color: var(--accent-primary);
                box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.25);
                color: white;
            }

            .btn-custom {
                background: linear-gradient(135deg, var(--accent-primary), #1d4ed8);
                color: white;
                border: none;
                border-radius: 12px;
                padding: 14px 20px;
                font-weight: 600;
                font-size: 1.05rem;
                width: 100%;
                transition: all 0.3s ease;
                box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
                margin-top: 10px;
            }

            .btn-custom:hover {
                transform: translateY(-2px);
                box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
                color: white;
            }

            .toggle-container {
                background: rgba(255, 255, 255, 0.03);
                padding: 4px;
                border-radius: 12px;
                display: inline-flex;
                border: 1px solid rgba(255, 255, 255, 0.05);
                margin-bottom: 25px;
            }

            .toggle-btn {
                border: none;
                background: transparent;
                color: #9ca3af;
                font-weight: 600;
                font-size: 0.9rem;
                padding: 8px 16px;
                border-radius: 8px;
                transition: all 0.3s ease;
            }

            .toggle-btn.active {
                background: rgba(255, 255, 255, 0.08);
                color: var(--accent-secondary);
            }

            a {
                color: var(--accent-primary);
                text-decoration: none;
                font-weight: 500;
            }

            a:hover {
                text-decoration: underline;
            }

            .logo-box {
                text-align: center;
                margin-bottom: 30px;
            }

            .logo-box h2 {
                font-weight: 800;
                letter-spacing: -1px;
                background: linear-gradient(to right, #ffffff, #9ca3af);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            /* Premium Footer Style */
            .footer {
                background: rgba(11, 12, 16, 0.9);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                border-top: 1px solid rgba(255, 255, 255, 0.06);
                color: var(--text-secondary);
                font-size: 0.9rem;
                transition: all 0.3s ease;
                width: 100%;
            }

            .footer .hover-white {
                transition: color 0.2s ease;
            }

            .footer .hover-white:hover {
                color: white !important;
            }
        </style>
    </head>
    
    <body class="d-flex flex-column min-vh-100">
        <div class="flex-grow-1 d-flex align-items-center justify-content-center py-5">
            <div class="auth-container">
            <div class="logo-box">
                <a href="index.html"><h2>CONCESSIONARIA AUTO</h2></a>
            </div>

            <div class="glass-card">
                <ul class="nav nav-pills nav-fill" id="authTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login-content" type="button" role="tab" aria-controls="login-content" aria-selected="true">Accedi</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register-content" type="button" role="tab" aria-controls="register-content" aria-selected="false">Registrati</button>
                    </li>
                </ul>

                <div class="tab-content">
                <!-- LOGIN -->
                <div class="tab-pane fade show active" id="login-content" role="tabpanel" aria-labelledby="login-tab">
                    <form id="loginForm" onsubmit="handleLogin(event)">
                        <div class="mb-3">
                            <label for="loginUsername" class="form-label">Email o Username</label>
                            <input type="text" class="form-control" id="loginUsername" placeholder="Es. admin o mail@esempio.it" required>
                        </div>
                        <div class="mb-4">
                            <label for="loginPassword" class="form-label">Password</label>
                            <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-custom">Accedi alla Piattaforma</button>
                    </form>
                </div>

                <!-- REGISTRAZIONE -->
                <div class="tab-pane fade" id="register-content" role="tabpanel" aria-labelledby="register-tab">
                    <div class="text-center">
                        <div class="toggle-container">
                            <button class="toggle-btn active" id="btnPrivato" onclick="switchUserType('privato')">Cliente Privato</button>
                            <button class="toggle-btn" id="btnAzienda" onclick="switchUserType('azienda')">Azienda</button>
                        </div>
                    </div>

                    <!-- FORM CLIENTE PRIVATO -->
                    <form id="formCliente" onsubmit="handleRegisterCliente(event)">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="cliNome" class="form-label">Nome</label>
                                <input type="text" class="form-control" id="cliNome" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="cliCognome" class="form-label">Cognome</label>
                                <input type="text" class="form-control" id="cliCognome" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="cliCF" class="form-label">Codice Fiscale</label>
                            <input type="text" class="form-control" id="cliCF" maxlength="16" placeholder="16 caratteri" required>
                        </div>
                        <div class="mb-3">
                            <label for="cliEmail" class="form-label">Email</label>
                            <input type="email" class="form-control" id="cliEmail" required>
                        </div>
                        <div class="mb-3">
                            <label for="cliPassword" class="form-label">Password</label>
                            <input type="password" class="form-control" id="cliPassword" placeholder="Minimo 6 caratteri" required>
                        </div>
                        <div class="mb-4">
                            <label for="cliIndirizzo" class="form-label">Indirizzo di Residenza</label>
                            <input type="text" class="form-control" id="cliIndirizzo" placeholder="Via, Città, CAP" required>
                        </div>
                        <button type="submit" class="btn btn-custom">Registrati come Cliente Privato</button>
                    </form>

                    <!-- FORM AZIENDA -->
                    <form id="formAzienda" onsubmit="handleRegisterAzienda(event)" style="display: none;">
                        <div class="mb-3">
                            <label for="azRagione" class="form-label">Ragione Sociale</label>
                            <input type="text" class="form-control" id="azRagione" required>
                        </div>
                        <div class="mb-3">
                            <label for="azPartitaIva" class="form-label">Partita IVA</label>
                            <input type="text" class="form-control" id="azPartitaIva" maxlength="11" placeholder="11 cifre" required>
                        </div>
                        <div class="mb-3">
                            <label for="azEmail" class="form-label">Email Aziendale</label>
                            <input type="email" class="form-control" id="azEmail" required>
                        </div>
                        <div class="mb-3">
                            <label for="azPassword" class="form-label">Password</label>
                            <input type="password" class="form-control" id="azPassword" placeholder="Minimo 6 caratteri" required>
                        </div>
                        <div class="mb-4">
                            <label for="azIndirizzo" class="form-label">Sede Legale (Indirizzo)</label>
                            <input type="text" class="form-control" id="azIndirizzo" placeholder="Via, Città, CAP" required>
                        </div>
                        <button type="submit" class="btn btn-custom" style="background: linear-gradient(135deg, var(--accent-secondary), #047857); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);">Registrati come Azienda</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

        <!-- Bootstrap JS Bundle -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            let currentRegisterType = 'privato';

            function switchUserType(type) {
                currentRegisterType = type;
                const formCli = document.getElementById('formCliente');
                const formAz = document.getElementById('formAzienda');
                const btnCli = document.getElementById('btnPrivato');
                const btnAz = document.getElementById('btnAzienda');

                if (type === 'privato') {
                    formCli.style.display = 'block';
                    formAz.style.display = 'none';
                    btnCli.classList.add('active');
                    btnAz.classList.remove('active');
                } else {
                    formCli.style.display = 'none';
                    formAz.style.display = 'block';
                    btnCli.classList.remove('active');
                    btnAz.classList.add('active');
                }
            }

            async function handleLogin(event) {
                event.preventDefault();
                const emailOrUsername = document.getElementById('loginUsername').value;
                const password = document.getElementById('loginPassword').value;

                try {
                    const response = await fetch('/api/v1/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ emailOrUsername, password })
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        alert("Errore: " + (err.errore || "Credenziali non corrette"));
                        return;
                    }

                    const data = await response.json();
                    localStorage.setItem('userToken', data.token);
                    localStorage.setItem('tipoUtente', data.tipoUtente);
                    localStorage.setItem('userData', JSON.stringify(data.utente));

                    alert("Accesso effettuato con successo!");
                    
                    if (data.tipoUtente === 'OPERATORE') {
                        window.location.href = 'Admin.html';
                    } else {
                        window.location.href = 'Configuratore.html';
                    }
                } catch (error) {
                    alert("Errore di rete durante la connessione al server.");
                }
            }

            async function handleRegisterCliente(event) {
                event.preventDefault();
                const nome = document.getElementById('cliNome').value;
                const cognome = document.getElementById('cliCognome').value;
                const codiceFiscale = document.getElementById('cliCF').value;
                const email = document.getElementById('cliEmail').value;
                const password = document.getElementById('cliPassword').value;
                const indirizzo = document.getElementById('cliIndirizzo').value;

                const payload = { nome, cognome, codiceFiscale, email, password, indirizzo };

                try {
                    const response = await fetch('/api/v1/auth/registrazione/cliente', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) {
                        alert("Registrazione completata! Ora puoi effettuare il login.");
                        document.getElementById('login-tab').click();
                        document.getElementById('loginUsername').value = email;
                    } else {
                        const err = await response.json();
                        alert("Errore registrazione: " + (err.errore || "Dati non validi"));
                    }
                } catch (error) {
                    alert("Errore di connessione al server.");
                }
            }

            async function handleRegisterAzienda(event) {
                event.preventDefault();
                const ragioneSociale = document.getElementById('azRagione').value;
                const partitaIva = document.getElementById('azPartitaIva').value;
                const email = document.getElementById('azEmail').value;
                const password = document.getElementById('azPassword').value;
                const indirizzo = document.getElementById('azIndirizzo').value;

                const payload = { ragioneSociale, partitaIva, email, password, indirizzo };

                try {
                    const response = await fetch('/api/v1/auth/registrazione/azienda', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) {
                        alert("Registrazione aziendale completata! Ora puoi effettuare il login.");
                        document.getElementById('login-tab').click();
                        document.getElementById('loginUsername').value = email;
                    } else {
                        const err = await response.json();
                        alert("Errore registrazione: " + (err.errore || "Dati non validi"));
                    }
                } catch (error) {
                    alert("Errore di connessione al server.");
                }
            }
        </script>
        </div>

        <!-- Footer -->
        <footer class="footer py-5 mt-auto">
            <div class="container">
                <div class="row g-4 align-items-center">
                    <div class="col-md-6 text-center text-md-start">
                        <h5 class="fw-bold mb-2 text-white" style="letter-spacing: -0.5px;">CONCESSIONARIA AUTO</h5>
                        <p class="text-secondary mb-0 small">Il futuro della guida, configurato da te. Progetta ogni dettaglio e invia la tua richiesta di acquisto online.</p>
                    </div>
                    <div class="col-md-6 text-center text-md-end">
                        <div class="footer-links mb-3">
                            <a href="index.html" class="text-secondary text-decoration-none mx-2 small hover-white">Home</a>
                            <a href="Configuratore.html" class="text-secondary text-decoration-none mx-2 small hover-white">Configuratore</a>
                        </div>
                        <p class="mb-0 text-secondary small">&copy; 2026 Concessionaria Auto S.p.A. Tutti i diritti riservati.</p>
                        <p class="text-secondary small mb-0 style-version" style="font-size: 0.75rem; opacity: 0.6;">Piattaforma di Configurazione v1.1 • Premium Design System</p>
                    </div>
                </div>
            </div>
        </footer>
    </body>
</html>
